name: Build and Release Zefsnap

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = python -c "import product_image_agent as app; print(app.__version__)"
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build app bundle
        run: pyinstaller build.spec

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=$version installer.iss

      - name: Verify frozen assets
        shell: pwsh
        run: |
          $verifyFile = Join-Path $env:TEMP "zefsnap_assets_verify.txt"
          if (Test-Path $verifyFile) { Remove-Item $verifyFile -Force }
          $process = Start-Process -FilePath "dist\Zefsnap\Zefsnap.exe" -ArgumentList "--verify-assets" -PassThru -WindowStyle Hidden
          if (-not $process.WaitForExit(60000)) {
            $process.Kill()
            throw "Frozen asset verification timed out."
          }
          if (-not (Test-Path $verifyFile)) { throw "Frozen asset verification file was not created." }
          $output = Get-Content $verifyFile -Raw | ConvertFrom-Json
          if (-not $output.icon_exists) { throw "Frozen build is missing icon.ico: $($output.icon_path)" }
          if ($output.wordmark_uri_len -lt 100) { throw "Frozen build wordmark data URI is empty." }
          Write-Host $output

      - name: Verify frozen SSL
        shell: pwsh
        run: |
          $verifyFile = Join-Path $env:TEMP "zefsnap_ssl_verify.txt"
          if (Test-Path $verifyFile) { Remove-Item $verifyFile -Force }
          $process = Start-Process -FilePath "dist\Zefsnap\Zefsnap.exe" -ArgumentList "--verify-ssl" -PassThru -WindowStyle Hidden
          if (-not $process.WaitForExit(60000)) {
            $process.Kill()
            throw "Frozen SSL verification timed out."
          }
          if (-not (Test-Path $verifyFile)) { throw "Frozen SSL verification file was not created." }
          $output = Get-Content $verifyFile -Raw
          if ($output -like "ERROR:*") { throw $output }
          Write-Host $output

      - name: Verify frozen fetch
        shell: pwsh
        run: |
          $verifyFile = Join-Path $env:TEMP "zefsnap_fetch_verify.txt"
          if (Test-Path $verifyFile) { Remove-Item $verifyFile -Force }
          $process = Start-Process -FilePath "dist\Zefsnap\Zefsnap.exe" -ArgumentList "--verify-fetch" -PassThru -WindowStyle Hidden
          if (-not $process.WaitForExit(90000)) {
            $process.Kill()
            throw "Frozen fetch verification timed out."
          }
          if (-not (Test-Path $verifyFile)) { throw "Frozen fetch verification file was not created." }
          $output = Get-Content $verifyFile -Raw
          if ($output -like "ERROR:*") { throw $output }
          Write-Host $output

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Zefsnap v${{ steps.version.outputs.version }}
          files: dist/ZefsnapSetup.exe
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
